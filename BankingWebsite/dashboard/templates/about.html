{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body style="background-color: #242424;">
    <nav class="navbar bg-info ">
        <div class="container-fluid bg-info justify-content-center" style="align-self: center;">
            <div class="d-flex position-absolute start-0 ps-3">
                <a class="navbar-brand text-dark d-flex" href="/home">
                    <p class="text-dark display-6 pe-3"><small>Logo</small></p>
                    <p class="text-dark h4" style="align-self: center;"">BrandName</p>
                </a>
            </div>
            <div> 
                <a class="btn btn-info" href="/home">Home</a>
                <a class="btn btn-info px-3" href="/account">Account</a>
                <a class="btn btn-info pe-3" href="/transfer">Transfer</a>
                <a class="btn btn-info" href="/about">About Us</a>
            </div>
            <div class="position-absolute end-0 pe-3 d-flex">     
                {% if name %}
                    <p class="text-dark pe-3 h5" style="align-self: center;"><small>User: {{ name }}</small></p>
                {% endif %}                  
                <div class="dropdown dropstart">
                    <button type="button" class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown" href="#">
                        <img src="{% static 'pfp.png' %}" alt="pfp" width="30">
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="/" class="dropdown-item">Login</a></li>
                        <li><a href="/logout" class="dropdown-item text-danger">Sign out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <p class="h1 text-info p-5" style="justify-self: center;">About This Project</p>
</body>
</html>
