{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body style="background-color: #242424;">
    <nav class="navbar bg-info ">
        <div class="container-fluid bg-info justify-content-center" style="align-self: center;">
            <div class="d-flex position-absolute start-0 ps-3">
                <a class="navbar-brand text-dark d-flex" href="/home">
                    <p class="text-dark display-6 pe-3"><small>Logo</small></p>
                    <p class="text-dark h4" style="align-self: center;"">BrandName</p>
                </a>
            </div>
            <div> 
                <a class="btn btn-info" href="/home">Home</a>
                <a class="btn btn-info px-3" href="/account">Account</a>
                <a class="btn btn-info pe-3" href="/transfer">Transfer</a>
                <a class="btn btn-info" href="/about">About Us</a>
            </div>
            <div class="position-absolute end-0 pe-3 d-flex">                  
                <div class="dropdown dropstart">
                    {% if name %}
                        <p class="text-dark pe-3 h5" style="align-self: center;"><small>User: {{ name }}</small></p>
                    {% endif %}  
                    <button type="button" class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown" href="#">
                        <img src="{% static 'pfp.png' %}" alt="pfp" width="30">
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="/login" class="dropdown-item">Login</a></li>
                        <li><a href="/logout" class="dropdown-item text-danger">Sign out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="container mt-5" style="width: 700px; height: 850px; background-color: #3d3d3d;">
            <form action="" method="POST">
                {% csrf_token %}
                <p class="text-info h2 mt-5 pt-5" style="justify-self: center;">Register</p>
                <div class="mb-3 mt-3 pt-3">
                    <label for="name" class="form-label text-info">Name:</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3 mt-3 pt-3"> 
                    <label for="email" class="form-label text-info">Email:</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3 mt-3 pt-3"> 
                    <label for="phone" class="form-label text-info">Phone Number:</label>
                    <input type="text" minlength="10" maxlength="10" name="phone" id="phone" class="form-control" required>
                </div>
                 <div class="mb-3 mt-3 pt-3"> 
                    <label for="Pwd" class="form-label text-info">Password:</label>
                    <input type="password" name="Pwd" id="Pwd" class="form-control" required>
                </div>
                <div class="mb-3 mt-3 pt-3"> 
                    <label for="Pwd" class="form-label text-info">Confirm Password:</label>
                    <input type="password" name="Con_Pwd" id="Con_Pwd" class="form-control" required>
                    <small class="text-light">Already have an account? <a href="/">Login</a></small>
                </div>
                <div class="" style="justify-self: center;">
                    <input type="submit" name="submit" id="submit" class="btn btn-info m-5">
                </div>
                {% if error %}
                    <p class="" style="justify-self: center; color: red;">{{ error }}</p>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
